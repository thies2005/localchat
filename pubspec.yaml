name: localchat
description: On-device AI chat powered by Gemini Nano
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  gemini_nano_android: ^1.1.2
  provider: ^6.1.0
  isar: ^4.0.0-dev.14
  isar_flutter_libs: ^4.0.0-dev.14
